[package]
name = "anti-cheat"        
version = "3.0.0"
edition = "2021"
authors = ["TuncorReUnion"]
description = "TLAC - Tuncor's Local Anti-Cheat"
license = "MIT"
repository = "https://github.com/TuncorReUnion/TLAC-MODERN-LOCAL-ANTI-CHEAT-REUNIONED"

[[bin]]
name = "anti-cheat"    
path = "src/main.rs"

[[bin]]
name = "ac-server"
path = "src/bin/server_main.rs"   # ← DİKKAT: Bu dosya gerçekten var mı? Yoksa "src/ac-server.rs" yazmalısın

[lib]
name = "anti_cheat"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"             
sha2 = "0.10"
rusqlite = { version = "0.31", features = ["bundled"] }
nix = "0.29"
procfs = "0.17"
hex = "0.4"
aya = { version = "0.14.0", optional = true }
lazy_static = "1.4"           

[dev-dependencies]
anyhow = "1.0"
