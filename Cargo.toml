[package]
name = "Anti-Cheat"
version = "0.1.0"
edition = "2021"

[lib]
name = "anti_cheat"
path = "src/lib.rs"

[[bin]]
name = "Anti-Cheat"
path = "src/main.rs"

[[bin]]
name = "ac-server"
path = "src/bin/server_main.rs"

[dependencies]
nix = { version = "0.31", features = ["process", "ptrace"] }
procfs = "0.17"
sha2 = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4"
tokio = { version = "1", features = ["full"] }
rusqlite = { version = "0.32", features = ["bundled"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.13.3", features = ["json"] }
