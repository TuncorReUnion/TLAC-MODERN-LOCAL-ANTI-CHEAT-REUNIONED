name: TLAC CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libbpf-dev linux-headers-generic \
            libudev-dev pkg-config bpftool

      - name: Generate vmlinux.h for eBPF
        run: |
          mkdir -p bpf
          bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h

      - name: Build eBPF Program
        run: |
          clang -g -O2 -target bpf -D__TARGET_ARCH_x86_64 \
            -mllvm -bpf-stack-size=1024 \
            -c bpf/program.bpf.c -o bpf/program.bpf.o

      - name: Create Placeholder Hash (Pre-Build)
        run: echo "placeholder" > bin_hash.txt

      - name: Build Anti-Cheat Binary
        run: cargo build --release

      - name: Generate Real Binary Hash
        run: |
          sha256sum target/release/anti-cheat | awk '{print $1}' > bin_hash.txt
          echo "✅ Generated hash:"
          cat bin_hash.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tlac-release
          path: |
            target/release/anti-cheat
            bin_hash.txt
            bpf/program.bpf.o
            signatures.json
            install.sh
          if-no-files-found: warn
